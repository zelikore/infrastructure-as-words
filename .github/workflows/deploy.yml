name: Deploy

on:
  push:
    branches:
      - dev
      - prod
  workflow_dispatch:
    inputs:
      target:
        description: Stack target to deploy
        required: true
        type: choice
        default: all
        options:
          - all
          - auth
          - prod
          - dev

concurrency:
  group: deploy-infrastructure-as-words-${{ github.ref_name }}
  cancel-in-progress: false

env:
  AWS_REGION: us-west-2
  NODE_VERSION: "22"
  TERRAFORM_VERSION: "1.8.5"

jobs:
  build:
    name: Build deploy artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      deploy_target: ${{ steps.target.outputs.target }}
    steps:
      - name: Resolve deployment target
        id: target
        shell: bash
        run: |
          target=""
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            target="${{ inputs.target }}"
          elif [[ "${GITHUB_REF_NAME}" == "dev" ]]; then
            target="dev"
          elif [[ "${GITHUB_REF_NAME}" == "prod" ]]; then
            target="prod"
          else
            echo "Unsupported ref ${GITHUB_REF_NAME}." >&2
            exit 1
          fi

          echo "target=${target}" >> "${GITHUB_OUTPUT}"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Install dependencies
        run: npm ci

      - name: Run strict repository checks
        run: npm run check

      - name: Build deployable artifacts
        run: npm run build:all

  deploy:
    name: Deploy stacks
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Require manual deploys from the matching environment branch
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          DEPLOY_TARGET: ${{ needs.build.outputs.deploy_target }}
        run: |
          if [[ "${DEPLOY_TARGET}" == "dev" && "${GITHUB_REF}" != "refs/heads/dev" ]]; then
            echo "Run dev deploys from the dev branch." >&2
            exit 1
          fi

          if [[ "${DEPLOY_TARGET}" == "auth" || "${DEPLOY_TARGET}" == "prod" || "${DEPLOY_TARGET}" == "all" ]]; then
            if [[ "${GITHUB_REF}" != "refs/heads/prod" ]]; then
              echo "Run auth/prod deploys from the prod branch." >&2
              exit 1
            fi
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Validate deploy role configuration
        id: deploy_role
        shell: bash
        env:
          DEPLOY_TARGET: ${{ needs.build.outputs.deploy_target }}
          AWS_DEPLOY_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          AWS_DEPLOY_ROLE_ARN_DEV: ${{ vars.AWS_DEPLOY_ROLE_ARN_DEV }}
          AWS_DEPLOY_ROLE_ARN_PROD: ${{ vars.AWS_DEPLOY_ROLE_ARN_PROD }}
        run: |
          role_arn=""
          case "${DEPLOY_TARGET}" in
            dev)
              role_arn="${AWS_DEPLOY_ROLE_ARN_DEV:-${AWS_DEPLOY_ROLE_ARN}}"
              ;;
            auth|prod|all)
              role_arn="${AWS_DEPLOY_ROLE_ARN_PROD:-${AWS_DEPLOY_ROLE_ARN}}"
              ;;
          esac

          if [[ -z "${role_arn}" ]]; then
            echo "Set AWS_DEPLOY_ROLE_ARN_DEV and AWS_DEPLOY_ROLE_ARN_PROD repository variables before running deploy." >&2
            exit 1
          fi

          echo "role_arn=${role_arn}" >> "${GITHUB_OUTPUT}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-infrastructure-as-words-${{ github.run_id }}
          role-to-assume: ${{ steps.deploy_role.outputs.role_arn }}

      - name: Install dependencies
        run: npm ci

      - name: Build deployable artifacts
        run: npm run build:all

      - name: Restore deployable artifacts
        shell: bash
        run: |
          archive_path="$(find . -maxdepth 3 -name deploy-assets.tgz -print -quit)"
          if [[ -z "${archive_path}" ]]; then
            echo "Could not find deploy-assets.tgz after artifact download." >&2
            exit 1
          fi

          tar -xzf "${archive_path}"

      - name: Deploy shared auth stack
        if: needs.build.outputs.deploy_target == 'all' || needs.build.outputs.deploy_target == 'auth' || needs.build.outputs.deploy_target == 'prod'
        env:
          DEPLOY_SKIP_BUILD: "1"
          DEPLOY_SKIP_CHECK: "1"
          DEPLOY_SKIP_INSTALL: "1"
        run: npm run deploy:auth

      - name: Deploy prod environment
        if: needs.build.outputs.deploy_target == 'all' || needs.build.outputs.deploy_target == 'prod'
        env:
          DEPLOY_ENV: prod
          DEPLOY_SKIP_BUILD: "1"
          DEPLOY_SKIP_CHECK: "1"
          DEPLOY_SKIP_INSTALL: "1"
        run: npm run deploy:env

      - name: Deploy dev environment
        if: needs.build.outputs.deploy_target == 'all' || needs.build.outputs.deploy_target == 'dev'
        env:
          DEPLOY_ENV: dev
          DEPLOY_SKIP_BUILD: "1"
          DEPLOY_SKIP_CHECK: "1"
          DEPLOY_SKIP_INSTALL: "1"
        run: npm run deploy:env
