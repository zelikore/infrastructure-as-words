name: CI

on:
  pull_request:
    branches:
      - development
      - main
  push:
    branches:
      - development
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  TERRAFORM_VERSION: "1.8.5"

jobs:
  main_pr_source_guard:
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    name: Require development source branch
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate pull request source branch
        shell: bash
        run: |
          if [[ "${GITHUB_HEAD_REF}" != "development" ]]; then
            echo "Pull requests into main must originate from the development branch." >&2
            exit 1
          fi

  actionlint:
    name: Workflow lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint GitHub Actions workflows
        uses: rhysd/actionlint@v1.7.11

  verify:
    name: Repo checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Install dependencies
        run: npm ci

      - name: Run strict repository checks
        run: npm run check

      - name: Build deployable artifacts
        run: npm run build:all
